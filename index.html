<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Devine le mot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Manifest PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- Icône / favicon pour Android -->
    <link rel="icon" href="icon.png" sizes="192x192" type="image/png">

    <!-- Couleur thème pour Android -->
    <meta name="theme-color" content="#000000">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="categories-screen" class="screen active">
    <h1>Choisis une catégorie</h1>
    <div id="categories" class="grid"></div>
    <button id="add-category">➕ Ajouter une catégorie</button>
</div>

<div id="add-screen" class="screen">
    <h2>Nouvelle catégorie</h2>
    <input id="new-cat-name" placeholder="Nom de la catégorie">
    <textarea id="new-cat-words" placeholder="1 mot par ligne"></textarea>
    <button id="save-category">Enregistrer</button>
    <button onclick="showCategories()">Annuler</button>
</div>

<div id="game-screen" class="screen">
    <div id="timer">01:00</div>
    <div id="word" class="word">MOT</div>
</div>

<div id="result-screen" class="screen">
    <h2>Résultat</h2>
    <div id="score">Mots trouvés : 0</div>
    <button id="replay">Rejouer</button>
    <button id="back-categories">Retour catégories</button>
</div>

<!-- Script principal -->
<script src="app.js"></script>

<!-- Service Worker pour PWA -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Service Worker enregistré"))
    .catch(err => console.log("Erreur SW:", err));
}
</script>

</body>
</html>
